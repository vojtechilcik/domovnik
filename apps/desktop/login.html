<!doctype html><html lang="cs"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Domovník — Správa nemovitostí</title>
<style>@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
:root{--ink:#1b1a17;--muted:#6f6e66;--paper:#eceae3;--surface:#faf9f5;--surface2:#f3f1ea;--line:#dbd8cf;--pine:#2f4a3e;--pine-soft:#e2eae3;--brick:#a13520;--ochre:#8a6420;--ochre-soft:#efe6d2;--white:#fff}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.landing{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:48px 40px;width:420px;max-width:90vw;box-shadow:0 4px 24px rgba(0,0,0,.04)}
.logo{font-size:32px;font-weight:700;color:var(--pine);margin-bottom:8px;letter-spacing:-.01em}
.tagline{color:var(--muted);font-size:15px;margin-bottom:36px;line-height:1.5}
.entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.entry-card{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:24px 16px;cursor:pointer;transition:all .15s;text-decoration:none;display:block}
.entry-card:hover{border-color:var(--pine);box-shadow:0 2px 8px rgba(0,0,0,.04);transform:translateY(-1px)}
.entry-card .icon{font-size:32px;margin-bottom:12px}
.entry-card .title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px}
.entry-card .desc{font-size:12px;color:var(--muted);line-height:1.4}
.demo-info{background:var(--pine-soft);border-radius:10px;padding:16px;font-size:12px;color:var(--pine);margin-top:20px;line-height:1.5}
.demo-info strong{color:var(--pine)}
</style></head><body>
<div class="landing">
<div class="logo">Domovník</div>
<p class="tagline">Správa nemovitostí pro český trh</p>
<div class="entry-grid">
<a href="login-landlord.html" class="entry-card">
<div class="icon">🏠</div>
<div class="title">Pronajímatel</div>
<div class="desc">Správa jednotek, nájemníků, plateb, revizí a závad</div>
</a>
<a href="login-tenant.html" class="entry-card">
<div class="icon">🔑</div>
<div class="title">Nájemník</div>
<div class="desc">Přehled plateb, hlášení závad, komunikace se správcem</div>
</a>
</div>
<div class="demo-info">
<strong>Demo přístup:</strong><br>
Pronajímatel: <strong>jan.novak@email.cz</strong><br>
Nájemník: <strong>petra@email.cz</strong><br>
Heslo: <strong>heslo123</strong>
</div>
</div>
</body></html>
