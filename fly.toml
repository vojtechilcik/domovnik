app = "domovnik"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[env]
  JWT_SECRET = "domovnik-production-jwt-secret-change-me"
  JWT_REFRESH_SECRET = "domovnik-production-refresh-secret-change-me"