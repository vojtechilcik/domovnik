services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-domovnik}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-domovnik}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domovnik"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-domovnik}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-domovnik}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent:
    build:
      context: .
      dockerfile: apps/server/Dockerfile.agent
    restart: always
    ports:
      - "3001:3001"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      API_URL: http://api:3000
    depends_on:
      - api

volumes:
  pgdata: